name: Sinhala Auto Reel Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * *"    # 7:00 AM Sri Lanka
    - cron: "30 4 * * *"    # 9:30 AM Sri Lanka
    - cron: "30 7 * * *"    # 12:30 PM Sri Lanka
    - cron: "30 12 * * *"   # 5:30 PM Sri Lanka
    - cron: "30 15 * * *"   # 8:30 PM Sri Lanka

jobs:
  create-and-upload-reel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Reel Bot
        run: python reel_bot.py

      - name: Upload Reel Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sinhala-reel-video
          path: sinhala_reel.mp4
