name: Sinhala Auto Reel Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * *"

jobs:
  create-and-upload-reel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg and Sinhala Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-core fonts-noto-extra

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Reel Bot
        run: python reel_bot.py

      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sinhala-reel-video
          path: sinhala_reel.mp4
