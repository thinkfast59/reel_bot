name: Sinhala Auto Reel Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * *"    # 7:00 AM Sri Lanka
    - cron: "30 4 * * *"    # 10:00 AM Sri Lanka
    - cron: "30 7 * * *"    # 1:00 PM Sri Lanka
    - cron: "30 12 * * *"   # 6:00 PM Sri Lanka
    - cron: "30 15 * * *"   # 9:00 PM Sri Lanka

permissions:
  contents: read

jobs:
  create-and-upload-reel:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Show Current Time
        run: |
          echo "UTC time:"
          date -u
          echo "Sri Lanka time:"
          TZ="Asia/Colombo" date

      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Show Files
        run: |
          ls -la
          echo "Workflow files:"
          ls -la .github/workflows || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-core fonts-noto-extra fonts-noto-ui-core

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check MoviePy
        run: |
          python -c "from moviepy.editor import ImageClip, AudioFileClip; print('MoviePy OK')"

      - name: Run Reel Bot
        run: python reel_bot.py

      - name: Upload Reel Video Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sinhala-reel-video
          path: sinhala_reel.mp4
