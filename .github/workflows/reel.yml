name: Sinhala Auto Reel Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * *"

jobs:
  create-and-upload-reel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Requirements
        run: pip install -r requirements.txt

      - name: Test MoviePy
        run: python -c "from moviepy.editor import ImageClip; print('MoviePy OK')"

      - name: Run Reel Bot
        run: python reel_bot.py
